name: Soviet Discourse Bot

on:
  schedule:
    - cron: "0 8 * * *"    # 08:00 UTC
    - cron: "0 14 * * *"   # 14:00 UTC
    - cron: "0 20 * * *"   # 20:00 UTC
  workflow_dispatch:
    inputs:
      topic:
        description: "Topic"
        type: choice
        default: random
        options:
          - random
          - agriculture
          - industry
          - theory
          - west
          - discipline
          - lysenko
          - cosmism
          - tektology
      voice:
        description: "Voice"
        type: choice
        default: auto
        options:
          - auto
          - classic
          - online
      fervour:
        description: "Fervour (intensity)"
        type: choice
        default: random
        options:
          - random
          - "1"
          - "2"
          - "3"
          - "4"
      dry_run:
        description: "Dry run — generate but do NOT post"
        type: boolean
        default: false

concurrency:
  group: bluesky-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Issue pronouncement
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          VOICE: ${{ github.event.inputs.voice || 'auto' }}
          TOPIC: ${{ github.event.inputs.topic || 'random' }}
          FERVOUR: ${{ github.event.inputs.fervour }}
        run: |
          BOT="$(find . -name soviet-bot.js -not -path '*/node_modules/*' | head -n 1)"
          if [ -z "$BOT" ]; then
            echo "Could not find soviet-bot.js anywhere in the repo. Files present:"
            find . -type f -not -path '*/.git/*'
            exit 1
          fi
          echo "Found bot at: $BOT"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — generating only, nothing will be posted."
            node "$BOT"
          else
            node "$BOT" --post
          fi
